<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>出欠管理｜先生画面</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:16px;}
.container{max-width:560px;margin:0 auto;padding:1rem;}
h1{font-size:17px;font-weight:700;margin-bottom:1rem;}
h2{font-size:12px;font-weight:600;margin-bottom:0.75rem;color:#888;text-transform:uppercase;letter-spacing:0.05em;}
.card{background:#fff;border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:0.85rem;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
label{display:block;font-size:12px;color:#888;margin-bottom:3px;font-weight:500;}
input[type=text],input[type=number],select{width:100%;padding:11px 12px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:15px;margin-bottom:0.7rem;background:#fafafa;}
input:focus,select:focus{outline:none;border-color:#1a73e8;background:#fff;}
.row{display:flex;gap:8px;}.row>*{flex:1;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:11px;font-size:16px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:0.6rem;}
.btn:active{opacity:0.8;}
.btn-primary{background:#1a73e8;color:#fff;}
.btn-danger{background:#ea4335;color:#fff;}
.btn-gray{background:#e8eaed;color:#333;}
.btn-outline{background:#fff;color:#1a73e8;border:1.5px solid #1a73e8;}
.btn-sm{padding:9px 14px;font-size:13px;width:auto;display:inline-block;margin-bottom:0;border-radius:8px;}
.status{font-size:13px;padding:9px 12px;border-radius:9px;margin-top:0.5rem;margin-bottom:0.5rem;}
.status.ok{background:#e6f4ea;color:#1e7e34;}
.status.warn{background:#fff8e1;color:#856404;}
.status.err{background:#fce8e6;color:#c62828;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0.85rem;}
.info-cell{background:#f8f9fa;border-radius:10px;padding:10px 12px;}
.info-cell .lbl{font-size:11px;color:#888;margin-bottom:2px;}
.info-cell .val{font-size:15px;font-weight:600;}
.count-big{font-size:36px;font-weight:700;color:#1a73e8;line-height:1;}
.count-label{font-size:13px;color:#888;margin-top:2px;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;padding:7px 8px;border-bottom:2px solid #f0f0f0;font-size:11px;color:#888;font-weight:600;}
td{padding:10px 8px;border-bottom:1px solid #f5f5f5;}
tr:last-child td{border-bottom:none;}
.sub{color:#999;font-size:13px;}
.empty{text-align:center;padding:1.5rem;color:#bbb;font-size:14px;}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:12px;font-weight:500;}
.badge.ok{background:#e6f4ea;color:#1e7e34;}
.badge.err{background:#fce8e6;color:#c62828;}
.badge.gray{background:#f0f0f0;color:#888;}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:0.7rem;}
.checkbox-row input[type=checkbox]{width:18px;height:18px;margin:0;cursor:pointer;}
.checkbox-row label{margin:0;font-size:15px;color:#1a1a1a;font-weight:500;cursor:pointer;}
.active-badge{display:inline-block;background:#e6f4ea;color:#1e7e34;font-size:13px;font-weight:600;padding:4px 12px;border-radius:99px;}
.qr-center{text-align:center;padding:0.5rem 0 0.5rem;}
.url-text{font-size:11px;color:#999;word-break:break-all;margin-top:0.5rem;background:#f8f8f8;padding:8px;border-radius:8px;}
.tab-row{display:flex;gap:6px;margin-bottom:1rem;}
.tab-btn{flex:1;padding:10px;border:1.5px solid #e0e0e0;border-radius:9px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:#888;}
.tab-btn.active{background:#1a73e8;color:#fff;border-color:#1a73e8;}
#active-area{display:none;}
#qr-section{display:none;}
#session-section{display:block;}
</style>
</head>
<body>
<div class="container">
  <h1>📋 出欠管理｜先生画面</h1>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('session')">受付管理</button>
    <button class="tab-btn" onclick="switchTab('qr')">QRコード発行</button>
  </div>

  <!-- 受付管理タブ -->
  <div id="session-section">
    <div id="setup-area">
      <div class="card">
        <h2>講義情報</h2>
        <label>講義名</label>
        <input type="text" id="lec-name" placeholder="例：心理学">
        <label>回数</label>
        <input type="number" id="lec-num" value="1" min="1">
      </div>
      <div class="card">
        <h2>GPS不正防止</h2>
        <div class="checkbox-row">
          <input type="checkbox" id="gps-enabled">
          <label for="gps-enabled">GPS不正防止を有効にする</label>
        </div>
        <div id="gps-options" style="display:none;">
          <label>許容半径（メートル）</label>
          <input type="number" id="gps-radius" value="200" min="10" max="500">
          <div class="row">
            <div><label>教室の緯度</label><input type="number" id="gps-lat" step="0.000001" value="43.1316623"></div>
            <div><label>教室の経度</label><input type="number" id="gps-lng" step="0.000001" value="141.4131607"></div>
          </div>
          <button class="btn btn-gray btn-sm" onclick="getGPS()">📍 現在地を取得</button>
          <div id="gps-status" class="status" style="display:none;"></div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startSession()">受付を開始する</button>
    </div>

    <div id="active-area">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.85rem;">
          <span class="active-badge">● 受付中</span>
          <button class="btn btn-danger btn-sm" onclick="closeSession()">受付を終了する</button>
        </div>
        <div class="info-grid">
          <div class="info-cell"><div class="lbl">講義名</div><div class="val" id="d-lec"></div></div>
          <div class="info-cell"><div class="lbl">回数</div><div class="val">第<span id="d-num"></span>回</div></div>
          <div class="info-cell"><div class="lbl">日付</div><div class="val" id="d-date"></div></div>
          <div class="info-cell"><div class="lbl">GPS</div><div class="val" id="d-gps"></div></div>
        </div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
          <div>
            <div class="count-big" id="live-count">0</div>
            <div class="count-label">名が出席登録済み</div>
          </div>
          <button class="btn btn-gray btn-sm" onclick="exportCSV()">CSVダウンロード</button>
        </div>
        <div id="list-wrap"><p class="empty">まだ出席者がいません</p></div>
      </div>
    </div>
  </div>

  <!-- QRコード発行タブ -->
  <div id="qr-section">
    <div class="card">
      <h2>QRコードを事前発行</h2>
      <p style="font-size:13px;color:#888;margin-bottom:0.75rem;">講義名と回数を入力してQRを生成し、スライドに貼ってください。</p>
      <label>講義名</label>
      <input type="text" id="qr-lec-name" placeholder="例：心理学">
      <label>回数</label>
      <input type="number" id="qr-lec-num" value="1" min="1">
      <button class="btn btn-outline" onclick="generateQR()">QRコードを生成する</button>
      <div id="qr-result" style="display:none;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid #f0f0f0;">
        <div class="qr-center" id="qr-preview-wrap"></div>
        <div style="text-align:center;margin-bottom:0.5rem;">
          <button class="btn btn-gray btn-sm" onclick="copyQR()">📋 QR画像をコピー</button>
          <span id="copy-msg" style="font-size:12px;color:#1e7e34;margin-left:8px;display:none;">コピーしました！</span>
        </div>
        <p class="url-text" id="qr-url"></p>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDHDIzuAInf4Zfb-vfcWDDPtkTD03TVwTI",
  authDomain: "attendance-confirmation-44806.firebaseapp.com",
  databaseURL: "https://attendance-confirmation-44806-default-rtdb.firebaseio.com",
  projectId: "attendance-confirmation-44806",
  storageBucket: "attendance-confirmation-44806.firebasestorage.app",
  messagingSenderId: "357767871355",
  appId: "1:357767871355:web:0670c7cbf5082ec2d19bde"
};

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyXi5ocqQclnEkoNE3XsDmW0nT2dUjmrTZ56JMwLmcCXdkSFhv2o-Oz6iwHIkMKdQAPHg/exec';

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentSession = null;
let attendees = [];
let knownIds = new Set();

// タブ切り替え
window.switchTab = function(tab) {
  document.getElementById('session-section').style.display = tab === 'session' ? 'block' : 'none';
  document.getElementById('qr-section').style.display = tab === 'qr' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'session') || (i === 1 && tab === 'qr'));
  });
};

// GPS有効/無効切り替え
document.getElementById('gps-enabled').addEventListener('change', function() {
  document.getElementById('gps-options').style.display = this.checked ? 'block' : 'none';
});

// 起動時：既存セッション確認
db.ref('session').once('value', snap => {
  const data = snap.val();
  if (data && data.active === true) {
    currentSession = data;
    showActiveUI();
    listenAttendees();
  }
});

// QR生成（事前発行）
window.generateQR = function() {
  const lec = document.getElementById('qr-lec-name').value.trim();
  const num = parseInt(document.getElementById('qr-lec-num').value);
  if (!lec || !num) { alert('講義名と回数を入力してください'); return; }
  const baseUrl = location.href.replace('teacher.html', 'student.html');
  const studentUrl = baseUrl + '?lec=' + encodeURIComponent(lec) + '&num=' + num;
  const wrap = document.getElementById('qr-preview-wrap');
  wrap.innerHTML = '';
  new QRCode(wrap, { text: studentUrl, width: 220, height: 220, colorDark: '#000', colorLight: '#fff' });
  document.getElementById('qr-url').textContent = studentUrl;
  document.getElementById('qr-result').style.display = 'block';
};

// QRコピー
window.copyQR = async function() {
  const canvas = document.querySelector('#qr-preview-wrap canvas');
  if (!canvas) { alert('QRコードを先に生成してください'); return; }
  try {
    canvas.toBlob(async blob => {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      const msg = document.getElementById('copy-msg');
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);
    });
  } catch(e) {
    const a = document.createElement('a');
    a.href = canvas.toDataURL();
    a.download = 'qrcode_' + document.getElementById('qr-lec-name').value + '_' + document.getElementById('qr-lec-num').value + '.png';
    a.click();
  }
};

// GPS取得
window.getGPS = function() {
  const el = document.getElementById('gps-status');
  el.textContent = '取得中...'; el.className = 'status warn'; el.style.display = 'block';
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById('gps-lat').value = pos.coords.latitude.toFixed(6);
    document.getElementById('gps-lng').value = pos.coords.longitude.toFixed(6);
    el.textContent = '✓ 取得完了（精度±' + Math.round(pos.coords.accuracy) + 'm）';
    el.className = 'status ok';
  }, () => {
    el.textContent = '取得失敗。手動で入力してください。';
    el.className = 'status err';
  }, { enableHighAccuracy: true, timeout: 10000 });
};

// 受付開始
window.startSession = function() {
  const lec = document.getElementById('lec-name').value.trim();
  const num = parseInt(document.getElementById('lec-num').value);
  const gpsEnabled = document.getElementById('gps-enabled').checked;
  const lat = parseFloat(document.getElementById('gps-lat').value);
  const lng = parseFloat(document.getElementById('gps-lng').value);
  const radius = parseInt(document.getElementById('gps-radius').value);
  if (!lec || !num) { alert('講義名と回を入力してください'); return; }
  if (gpsEnabled && (isNaN(lat) || isNaN(lng))) { alert('教室の緯度・経度を入力してください'); return; }

  attendees = [];
  knownIds = new Set();
  const dateStr = new Date().toLocaleDateString('ja-JP');
  currentSession = { lec, num, active: true, date: dateStr, gps: gpsEnabled ? { lat, lng, radius } : null };

  db.ref('session').set(currentSession);
  db.ref('attendance/' + lec + '__' + num + '/meta').set({ lec, num, date: dateStr });

  showActiveUI();
  listenAttendees();
};

// 受付終了
window.closeSession = function() {
  if (!confirm('受付を終了しますか？')) return;
  db.ref('session').set({ active: false });
  currentSession = null;
  document.getElementById('active-area').style.display = 'none';
  document.getElementById('setup-area').style.display = 'block';
  const n = parseInt(document.getElementById('lec-num').value);
  document.getElementById('lec-num').value = n + 1;
  attendees = [];
  knownIds = new Set();
};

function showActiveUI() {
  document.getElementById('setup-area').style.display = 'none';
  document.getElementById('active-area').style.display = 'block';
  document.getElementById('d-lec').textContent = currentSession.lec;
  document.getElementById('d-num').textContent = currentSession.num;
  document.getElementById('d-date').textContent = currentSession.date;
  document.getElementById('d-gps').textContent = currentSession.gps ? '有効（±' + currentSession.gps.radius + 'm）' : '無効';
}

function listenAttendees() {
  if (!currentSession) return;
  const key = currentSession.lec + '__' + currentSession.num;
  db.ref('attendance/' + key + '/attendees').on('value', snap => {
    const all = snap.val() ? Object.values(snap.val()) : [];
    all.forEach(a => {
      if (!knownIds.has(a.id)) {
        knownIds.add(a.id);
        sendToSheet(Object.assign({}, a, { lec: currentSession.lec, num: currentSession.num }));
      }
    });
    attendees = all;
    renderList();
  });
}

async function sendToSheet(entry) {
  try {
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(entry) });
  } catch(e) { console.warn('GAS送信失敗:', e); }
}

function renderList() {
  document.getElementById('live-count').textContent = attendees.length;
  const wrap = document.getElementById('list-wrap');
  if (attendees.length === 0) { wrap.innerHTML = '<p class="empty">まだ出席者がいません</p>'; return; }
  let h = '<table><thead><tr><th>#</th><th>氏名</th><th>学籍番号</th><th>時刻</th><th>GPS</th></tr></thead><tbody>';
  attendees.forEach(function(a, i) {
    const t = new Date(a.time).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const gps = a.gpsSkipped ? '<span class="badge gray">未検証</span>' : a.gpsOk ? '<span class="badge ok">✓' + Math.round(a.distance) + 'm</span>' : '<span class="badge err">NG</span>';
    h += '<tr><td class="sub">' + (i+1) + '</td><td><b>' + a.name + '</b></td><td class="sub">' + a.id + '</td><td class="sub">' + t + '</td><td>' + gps + '</td></tr>';
  });
  h += '</tbody></table>';
  wrap.innerHTML = h;
}

window.exportCSV = function() {
  if (attendees.length === 0) { alert('出席者がいません'); return; }
  let csv = '番号,氏名,学籍番号,登録時刻,GPS\n';
  attendees.forEach(function(a, i) {
    const gps = a.gpsSkipped ? '未検証' : a.gpsOk ? 'OK(' + Math.round(a.distance) + 'm)' : 'NG';
    csv += (i+1) + ',' + a.name + ',' + a.id + ',' + new Date(a.time).toLocaleString('ja-JP') + ',' + gps + '\n';
  });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '出席_' + currentSession.lec + '_第' + currentSession.num + '回.csv';
  a.click();
};
</script>
</body>
</html>
