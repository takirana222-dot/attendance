<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>出席登録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:16px;}
.container{max-width:480px;margin:0 auto;padding:1rem;}
h1{font-size:17px;font-weight:700;margin-bottom:1rem;}
.card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:0.85rem;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
label{display:block;font-size:12px;color:#888;margin-bottom:3px;font-weight:500;}
input{width:100%;padding:13px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:0.75rem;background:#fafafa;}
input:focus{outline:none;border-color:#1a73e8;background:#fff;}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:11px;font-size:17px;font-weight:700;cursor:pointer;}
.btn-primary{background:#1a73e8;color:#fff;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.status{font-size:13px;padding:10px 13px;border-radius:9px;margin-bottom:0.75rem;}
.status.ok{background:#e6f4ea;color:#1e7e34;}
.status.warn{background:#fff8e1;color:#856404;}
.status.err{background:#fce8e6;color:#c62828;}
.msg{font-size:15px;padding:14px;border-radius:10px;margin-top:0.75rem;font-weight:600;}
.msg.ok{background:#e6f4ea;color:#1e7e34;}
.msg.err{background:#fce8e6;color:#c62828;font-weight:400;}
.info-box{background:#f8f9fa;border-radius:10px;padding:1rem;margin-bottom:1rem;}
.info-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;border-bottom:1px solid #eee;}
.info-row:last-child{border-bottom:none;}
.info-row span:first-child{color:#888;}
</style>
</head>
<body>
<div class="container">
  <h1>📝 出席登録</h1>
  <div id="root"><div class="card" style="text-align:center;padding:2rem;"><p style="font-size:24px;margin-bottom:0.5rem;">⏳</p><p style="font-weight:600;">接続中...</p></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDHDIzuAInf4Zfb-vfcWDDPtkTD03TVwTI",
  authDomain: "attendance-confirmation-44806.firebaseapp.com",
  databaseURL: "https://attendance-confirmation-44806-default-rtdb.firebaseio.com",
  projectId: "attendance-confirmation-44806",
  storageBucket: "attendance-confirmation-44806.firebasestorage.app",
  messagingSenderId: "357767871355",
  appId: "1:357767871355:web:0670c7cbf5082ec2d19bde"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// URLパラメータから講義情報を取得
const params = new URLSearchParams(location.search);
const urlLec = params.get('lec');
const urlNum = parseInt(params.get('num'));

let session = null;
let registered = false;
let studentGPS = null;
let gpsWatchId = null;

function deg2rad(d){ return d * Math.PI / 180; }
function calcDistance(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=deg2rad(lat2-lat1),dLng=deg2rad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// URLパラメータがない場合
if (!urlLec || !urlNum) {
  document.getElementById('root').innerHTML = '<div class="card" style="text-align:center;padding:2rem;"><p style="font-size:24px;margin-bottom:0.5rem;">❌</p><p style="font-weight:600;">無効なQRコードです</p><p style="font-size:13px;color:#999;margin-top:0.5rem;">先生が発行したQRコードを読み取ってください</p></div>';
} else {
  // セッション監視
  db.ref('session').on('value', snap => {
    const data = snap.val();
    if (data && data.active === true && data.lec === urlLec && data.num === urlNum) {
      session = data;
      renderSession();
      if (session.gps) startGPSWatch();
    } else if (data && data.active === true && (data.lec !== urlLec || data.num !== urlNum)) {
      // 別の講義が受付中
      session = null;
      renderWrongSession(data);
    } else {
      session = null;
      renderNoSession();
    }
  });
}

function renderNoSession(){
  document.getElementById('root').innerHTML =
    '<div class="card" style="text-align:center;padding:2rem;">' +
    '<p style="font-size:24px;margin-bottom:0.75rem;">⏳</p>' +
    '<p style="font-size:15px;font-weight:600;margin-bottom:0.5rem;">受付はまだ開始されていません</p>' +
    '<p style="font-size:13px;color:#999;">講義：' + urlLec + ' 第' + urlNum + '回</p>' +
    '<p style="font-size:13px;color:#999;margin-top:0.25rem;">先生が受付を開始すると登録できます</p>' +
    '</div>';
}

function renderWrongSession(data){
  document.getElementById('root').innerHTML =
    '<div class="card" style="text-align:center;padding:2rem;">' +
    '<p style="font-size:24px;margin-bottom:0.75rem;">⚠️</p>' +
    '<p style="font-size:15px;font-weight:600;margin-bottom:0.5rem;">このQRコードは現在の講義と一致しません</p>' +
    '<p style="font-size:13px;color:#999;">このQR：' + urlLec + ' 第' + urlNum + '回</p>' +
    '<p style="font-size:13px;color:#999;">受付中：' + data.lec + ' 第' + data.num + '回</p>' +
    '</div>';
}

function renderSession(){
  const gpsNote = session.gps ? 'GPS不正防止：有効（許容半径 ' + session.gps.radius + 'm）' : 'GPS不正防止：無効';
  document.getElementById('root').innerHTML =
    '<div class="info-box">' +
    '<div class="info-row"><span>講義名</span><strong>' + session.lec + '</strong></div>' +
    '<div class="info-row"><span>回数</span><span>第<strong>' + session.num + '</strong>回</span></div>' +
    '<div class="info-row"><span>日付</span><span>' + session.date + '</span></div>' +
    '</div>' +
    '<p style="font-size:12px;color:#999;margin-bottom:0.5rem;">' + gpsNote + '</p>' +
    '<div id="gps-status"></div>' +
    '<div class="card" id="form-area">' +
    '<label>氏名</label>' +
    '<input type="text" id="st-name" placeholder="山田 太郎" autocomplete="name">' +
    '<label>学籍番号</label>' +
    '<input type="text" id="st-id" placeholder="2024001" autocomplete="off">' +
    '<button class="btn btn-primary" id="reg-btn" onclick="register()">出席を登録する</button>' +
    '<div id="msg"></div>' +
    '</div>';
}

function startGPSWatch(){
  showGPS('warn','位置情報を取得中...');
  if(!navigator.geolocation){showGPS('err','位置情報に非対応のブラウザです');return;}
  if(gpsWatchId!==null) navigator.geolocation.clearWatch(gpsWatchId);
  gpsWatchId = navigator.geolocation.watchPosition(pos=>{
    studentGPS={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};
    if(!session||!session.gps){showGPS('ok','位置情報取得済み');return;}
    const dist=calcDistance(studentGPS.lat,studentGPS.lng,session.gps.lat,session.gps.lng);
    const ok=dist<=session.gps.radius;
    showGPS(ok?'ok':'err', ok?'✓ 教室内を確認（距離：約'+Math.round(dist)+'m）':'教室から離れすぎています（約'+Math.round(dist)+'m / 許容'+session.gps.radius+'m）');
  },err=>{
    showGPS('err',err.code===1?'位置情報の使用が拒否されました':'位置情報の取得に失敗しました');
  },{enableHighAccuracy:true,timeout:15000,maximumAge:5000});
}

function showGPS(type,msg){
  const el=document.getElementById('gps-status');
  if(!el) return;
  el.textContent=msg;
  el.className='status '+type;
}

function register(){
  if(registered) return;
  const name=document.getElementById('st-name').value.trim();
  const id=document.getElementById('st-id').value.trim();
  if(!name||!id){showMsg('err','氏名と学籍番号を入力してください');return;}
  if(!session||!session.active){showMsg('err','セッションが終了しています');return;}

  if(session.gps){
    if(!studentGPS){showMsg('err','位置情報を取得中です。しばらく待ってください。');return;}
    const dist=calcDistance(studentGPS.lat,studentGPS.lng,session.gps.lat,session.gps.lng);
    if(dist>session.gps.radius){showMsg('err','教室の範囲外のため登録できません（距離：約'+Math.round(dist)+'m）');return;}
  }

  document.getElementById('reg-btn').disabled=true;
  const key=session.lec+'__'+session.num;

  db.ref('attendance/'+key+'/attendees').once('value', snap=>{
    const existing=snap.val()?Object.values(snap.val()):[];
    if(existing.find(a=>a.id===id)){showMsg('err','この学籍番号はすでに登録済みです');document.getElementById('reg-btn').disabled=false;return;}
    const dist=session.gps&&studentGPS?calcDistance(studentGPS.lat,studentGPS.lng,session.gps.lat,session.gps.lng):0;
    const entry={name,id,time:Date.now(),gpsSkipped:!session.gps,gpsOk:!!session.gps,distance:dist};
    db.ref('attendance/'+key+'/attendees').push(entry).then(()=>{
      registered=true;
      showMsg('ok','✓ '+name+'さんの出席を登録しました');
      document.getElementById('form-area').style.display='none';
    });
  });
}

function showMsg(type,text){
  const el=document.getElementById('msg');
  if(!el) return;
  el.textContent=text;
  el.className='msg '+type;
}
</script>
</body>
</html>
