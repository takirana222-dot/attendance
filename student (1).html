<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>出席登録</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHDIzuAInf4Zfb-vfcWDDPtkTD03TVwTI",
  authDomain: "attendance-confirmation-44806.firebaseapp.com",
  databaseURL: "https://attendance-confirmation-44806-default-rtdb.firebaseio.com",
  projectId: "attendance-confirmation-44806",
  storageBucket: "attendance-confirmation-44806.firebasestorage.app",
  messagingSenderId: "357767871355",
  appId: "1:357767871355:web:0670c7cbf5082ec2d19bde"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let session = null;
let studentGPS = null;
let gpsWatchId = null;
let registered = false;

function deg2rad(d) { return d * Math.PI / 180; }
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = deg2rad(lat2 - lat1), dLng = deg2rad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// セッション監視
onValue(ref(db, 'session'), snap => {
  const data = snap.val();
  if (data && data.active) {
    session = data;
    showSession();
    if (session.gps) startGPSWatch();
    else hideGPSStatus();
  } else {
    session = null;
    showNoSession();
  }
});

function showSession() {
  document.getElementById('no-session').style.display = 'none';
  document.getElementById('session-area').style.display = '';
  document.getElementById('s-lec').textContent = session.lec;
  document.getElementById('s-num').textContent = session.num;
  document.getElementById('s-date').textContent = session.date;
  document.getElementById('gps-note').textContent = session.gps
    ? `GPS不正防止：有効（許容半径 ${session.gps.radius}m）` : 'GPS不正防止：無効';
  if (!registered) document.getElementById('reg-btn').disabled = false;
}

function showNoSession() {
  document.getElementById('no-session').style.display = '';
  document.getElementById('session-area').style.display = 'none';
}

function hideGPSStatus() {
  document.getElementById('gps-status').style.display = 'none';
}

function startGPSWatch() {
  if (!navigator.geolocation) { showGPS('err', '位置情報に非対応のブラウザです'); return; }
  showGPS('warn', '位置情報を取得中...');
  if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    studentGPS = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
    if (!session || !session.gps) { showGPS('ok', '位置情報取得済み'); return; }
    const dist = calcDistance(studentGPS.lat, studentGPS.lng, session.gps.lat, session.gps.lng);
    const ok = dist <= session.gps.radius;
    showGPS(ok ? 'ok' : 'err',
      ok ? `✓ 教室内を確認（距離：約${Math.round(dist)}m）`
         : `教室から離れすぎています（約${Math.round(dist)}m / 許容${session.gps.radius}m）`);
  }, err => {
    showGPS('err', err.code === 1 ? '位置情報の使用が拒否されました' : '位置情報の取得に失敗しました');
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 });
}

function showGPS(type, msg) {
  const el = document.getElementById('gps-status');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = '';
}

window.register = async function() {
  if (registered) return;
  const name = document.getElementById('st-name').value.trim();
  const id = document.getElementById('st-id').value.trim();
  if (!name || !id) { showMsg('err', '氏名と学籍番号を入力してください'); return; }
  if (!session || !session.active) { showMsg('err', 'セッションが終了しています'); return; }

  // GPS検証
  if (session.gps) {
    if (!studentGPS) { showMsg('err', '位置情報を取得中です。しばらく待ってください。'); return; }
    const dist = calcDistance(studentGPS.lat, studentGPS.lng, session.gps.lat, session.gps.lng);
    if (dist > session.gps.radius) {
      showMsg('err', `教室の範囲外のため登録できません（距離：約${Math.round(dist)}m）`);
      return;
    }
  }

  // 重複チェック
  const key = `${session.lec}__${session.num}`;
  const snap = await get(ref(db, `attendance/${key}/attendees`));
  const existing = snap.val() ? Object.values(snap.val()) : [];
  if (existing.find(a => a.id === id)) {
    showMsg('err', 'この学籍番号はすでに登録済みです');
    return;
  }

  // 登録ボタン無効化（二重送信防止）
  document.getElementById('reg-btn').disabled = true;

  const dist = session.gps && studentGPS
    ? calcDistance(studentGPS.lat, studentGPS.lng, session.gps.lat, session.gps.lng) : 0;

  const entry = {
    name, id, time: Date.now(),
    gpsSkipped: !session.gps,
    gpsOk: session.gps ? true : false,
    distance: dist
  };

  await push(ref(db, `attendance/${key}/attendees`), entry);
  registered = true;
  showMsg('ok', `✓ ${name}さんの出席を登録しました`);
  document.getElementById('form-area').style.display = 'none';
};

function showMsg(type, text) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = '';
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:16px;}
.container{max-width:480px;margin:0 auto;padding:1rem;}
h1{font-size:17px;font-weight:700;margin-bottom:1rem;}
.card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:0.85rem;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
label{display:block;font-size:12px;color:#888;margin-bottom:3px;font-weight:500;}
input{width:100%;padding:13px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:0.75rem;background:#fafafa;}
input:focus{outline:none;border-color:#1a73e8;background:#fff;}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:11px;font-size:17px;font-weight:700;cursor:pointer;}
.btn-primary{background:#1a73e8;color:#fff;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.status{font-size:13px;padding:10px 13px;border-radius:9px;margin-bottom:0.75rem;}
.status.ok{background:#e6f4ea;color:#1e7e34;}
.status.warn{background:#fff8e1;color:#856404;}
.status.err{background:#fce8e6;color:#c62828;}
.msg{font-size:15px;padding:14px;border-radius:10px;margin-top:0.75rem;font-weight:600;display:none;}
.msg.ok{background:#e6f4ea;color:#1e7e34;}
.msg.err{background:#fce8e6;color:#c62828;font-weight:400;}
.info-box{background:#f8f9fa;border-radius:10px;padding:1rem;margin-bottom:1rem;}
.info-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;border-bottom:1px solid #eee;}
.info-row:last-child{border-bottom:none;}
.info-row span:first-child{color:#888;}
.info-row strong{font-weight:600;}
#no-session{text-align:center;padding:2rem 1rem;}
#session-area{display:none;}
#gps-status{display:none;}
</style>
</head>
<body>
<div class="container">
  <h1>📝 出席登録</h1>

  <div id="no-session" class="card">
    <p style="font-size:28px;margin-bottom:0.75rem;">⏳</p>
    <p style="font-size:15px;font-weight:600;margin-bottom:0.5rem;">受付中のセッションはありません</p>
    <p style="font-size:13px;color:#999;">先生が受付を開始すると自動的に表示されます</p>
  </div>

  <div id="session-area">
    <div class="info-box">
      <div class="info-row"><span>講義名</span><strong id="s-lec"></strong></div>
      <div class="info-row"><span>回数</span><span>第<strong id="s-num"></strong>回</span></div>
      <div class="info-row"><span>日付</span><span id="s-date"></span></div>
    </div>

    <p id="gps-note" style="font-size:12px;color:#999;margin-bottom:0.5rem;"></p>
    <div id="gps-status" class="status"></div>

    <div class="card" id="form-area">
      <label>氏名</label>
      <input type="text" id="st-name" placeholder="山田 太郎" autocomplete="name">
      <label>学籍番号</label>
      <input type="text" id="st-id" placeholder="2024001" autocomplete="off">
      <button class="btn btn-primary" id="reg-btn" onclick="register()" disabled>出席を登録する</button>
      <div id="msg"></div>
    </div>
  </div>
</div>
</body>
</html>
